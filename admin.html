<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #8e44ad; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #732d91; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        .summary { margin-top: 20px; padding: 15px; background-color: #d4efdf; color: #1e8449; border-radius: 5px; font-weight: bold; text-align: center; display: none; }
        #loading { text-align: center; color: #7f8c8d; font-style: italic; display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Teacher Dashboard: Prayer Logs</h2>
    <p>Search for a student to view their tracked prayers.</p>
    
    <div class="search-box">
        <input type="text" id="searchName" placeholder="Enter exact student name...">
        <button onclick="fetchStudentData()">Search</button>
    </div>

    <div id="loading">Fetching database... please wait.</div>
    
    <div id="summaryCard" class="summary"></div>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>Date</th>
                <th>Class</th>
                <th>Fajr</th>
                <th>Dhuhr</th>
                <th>Asr</th>
                <th>Maghrib</th>
                <th>Isha</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // REPLACE THIS WITH YOUR GOOGLE SCRIPT WEB APP URL
    const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL';

    function fetchStudentData() {
        const searchName = document.getElementById('searchName').value.trim().toLowerCase();
        if (!searchName) return alert("Please enter a name.");

        const table = document.getElementById('resultsTable');
        const tbody = document.getElementById('tableBody');
        const summary = document.getElementById('summaryCard');
        const loading = document.getElementById('loading');

        // Reset UI
        table.style.display = 'none';
        summary.style.display = 'none';
        tbody.innerHTML = '';
        loading.style.display = 'block';

        // Fetch data from Google Sheet
        fetch(GOOGLE_SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                
                // Filter data for the searched student
                const studentLogs = data.filter(row => 
                    row.Name && row.Name.toLowerCase() === searchName
                );

                if (studentLogs.length === 0) {
                    summary.style.display = 'block';
                    summary.style.backgroundColor = '#fadbd8';
                    summary.style.color = '#c0392b';
                    summary.innerText = "No logs found for this student.";
                    return;
                }

                let totalPrayersEver = 0;

                // Populate table
                studentLogs.forEach(log => {
                    totalPrayersEver += parseInt(log['Total Prayed'] || 0);
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${log['Log Date']}</td>
                        <td>${log['Class']}</td>
                        <td>${log['Fajr']}</td>
                        <td>${log['Dhuhr']}</td>
                        <td>${log['Asr']}</td>
                        <td>${log['Maghrib']}</td>
                        <td>${log['Isha']}</td>
                        <td><strong>${log['Total Prayed']}</strong></td>
                    `;
                    tbody.appendChild(tr);
                });

                // Show results
                table.style.display = 'table';
                summary.style.display = 'block';
                summary.style.backgroundColor = '#d4efdf';
                summary.style.color = '#1e8449';
                summary.innerText = `Total lifetime prayers logged by this student: ${totalPrayersEver}`;
            })
            .catch(error => {
                console.error("Error:", error);
                loading.style.display = 'none';
                alert("Failed to load data. Make sure your Web App permissions are set to 'Anyone'.");
            });
    }
</script>

</body>
</html>
