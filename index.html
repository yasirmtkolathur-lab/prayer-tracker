<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Prayer Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #34495e; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; background: #fdfdfd; padding: 10px; border: 1px solid #eee; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2ecc71; }
        .message { text-align: center; margin-top: 15px; font-weight: bold; color: #27ae60; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🕌 Daily Prayer Tracker</h2>
    <form id="prayerForm">
        <label for="name">Student Name</label>
        <input type="text" id="name" name="name" required placeholder="Enter full name">

        <label for="studentClass">Grade / Class</label>
        <input type="text" id="studentClass" name="studentClass" required placeholder="e.g. 10th Grade">

        <label>Prayers Completed Today</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="fajr"> Fajr</label>
            <label class="checkbox-item"><input type="checkbox" id="dhuhr"> Dhuhr</label>
            <label class="checkbox-item"><input type="checkbox" id="asr"> Asr</label>
            <label class="checkbox-item"><input type="checkbox" id="maghrib"> Maghrib</label>
            <label class="checkbox-item"><input type="checkbox" id="isha"> Isha</label>
        </div>

        <button type="submit" id="submitBtn">Submit Log</button>
        <div id="statusMessage" class="message">Submission saved successfully!</div>
    </form>
</div>

<script>
    document.getElementById('prayerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');
        btn.textContent = "Saving...";
        btn.disabled = true;

        // Gather data
        const payload = {
            name: document.getElementById('name').value,
            studentClass: document.getElementById('studentClass').value,
            fajr: document.getElementById('fajr').checked,
            dhuhr: document.getElementById('dhuhr').checked,
            asr: document.getElementById('asr').checked,
            maghrib: document.getElementById('maghrib').checked,
            isha: document.getElementById('isha').checked
        };

        // REPLACE THIS URL WITH YOUR DEPLOYED GOOGLE SCRIPT WEB APP URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZyCP2BXjZd0BpuJWwugvdEWRY0lPxk1GvVDGACSsviOV-kelbHTdpL11d7B_OMAmG/exec';

        // Send to Google Apps Script
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // Bypasses CORS issues when sending to Google Apps Script
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('prayerForm').reset();
            btn.textContent = "Submit Log";
            btn.disabled = false;
            statusMsg.style.display = "block";
            setTimeout(() => { statusMsg.style.display = "none"; }, 4000);
        }).catch(error => {
            console.error('Error!', error.message);
            btn.textContent = "Submit Log";
            btn.disabled = false;
            alert("There was an error submitting. Please try again.");
        });
    });
</script>

</body>
</html>
