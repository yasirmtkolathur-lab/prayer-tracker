<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Prayer Tracker Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #34495e; }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; margin-bottom: 25px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; background: #f9f9f9; padding: 12px; border: 1px solid #e0e0e0; border-radius: 5px; cursor: pointer; }
        .checkbox-item:hover { background-color: #f1f1f1; }
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .message { text-align: center; margin-top: 15px; font-weight: bold; color: #27ae60; display: none; padding: 10px; background: #e8f8f5; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🕌 Daily Prayer Tracker</h2>
    <form id="prayerForm">
        <label for="logDate">Date</label>
        <input type="date" id="logDate" name="logDate" required>

        <label for="name">Student Name</label>
        <input type="text" id="name" name="name" required placeholder="Enter full name">

        <label for="studentClass">Grade / Class</label>
        <input type="text" id="studentClass" name="studentClass" required placeholder="e.g. 10th Grade">

        <label>Prayers Completed</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="fajr"> Fajr</label>
            <label class="checkbox-item"><input type="checkbox" id="dhuhr"> Dhuhr</label>
            <label class="checkbox-item"><input type="checkbox" id="asr"> Asr</label>
            <label class="checkbox-item"><input type="checkbox" id="maghrib"> Maghrib</label>
            <label class="checkbox-item"><input type="checkbox" id="isha"> Isha</label>
        </div>

        <button type="submit" id="submitBtn">Submit Log</button>
        <div id="statusMessage" class="message">Submission saved successfully!</div>
    </form>
</div>

<script>
    // Auto-fill today's date in the date picker
    document.getElementById('logDate').valueAsDate = new Date();

    document.getElementById('prayerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');
        btn.textContent = "Saving securely...";
        btn.disabled = true;

        const payload = {
            logDate: document.getElementById('logDate').value,
            name: document.getElementById('name').value,
            studentClass: document.getElementById('studentClass').value,
            fajr: document.getElementById('fajr').checked,
            dhuhr: document.getElementById('dhuhr').checked,
            asr: document.getElementById('asr').checked,
            maghrib: document.getElementById('maghrib').checked,
            isha: document.getElementById('isha').checked
        };

        // REPLACE THIS URL WITH YOUR NEW GOOGLE SCRIPT WEB APP URL
        const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL';

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('prayerForm').reset();
            document.getElementById('logDate').valueAsDate = new Date(); // Reset date to today
            btn.textContent = "Submit Log";
            btn.disabled = false;
            statusMsg.style.display = "block";
            setTimeout(() => { statusMsg.style.display = "none"; }, 4000);
        }).catch(error => {
            console.error('Error!', error.message);
            btn.textContent = "Submit Log";
            btn.disabled = false;
            alert("Error submitting. Please check your internet connection.");
        });
    });
</script>

</body>
</html>
